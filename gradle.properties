#Kotlin
kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx3072M
# Required so the TLS cinterop in :client (termtasticTls) is visible to
# iosMain/appleMain shared source sets — see client/build.gradle.kts and
# client/src/nativeInterop/cinterop/termtasticTls.def.
kotlin.mpp.enableCInteropCommonization=true

#Gradle
org.gradle.jvmargs=-Xmx4096M -Dfile.encoding=UTF-8
org.gradle.configuration-cache=true
org.gradle.caching=true

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

#Darkness toolkit
# Point at the active feature worktree of darkness-toolkit. The default
# auto-detect (in settings.gradle.kts) tries `develop` then `main`; this
# override pins a specific path when neither default fits.
darkness.toolkit.path=../../darkness-toolkit/develop