<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termtastic</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
<!--
    Termtastic now mounts its UI through `darkness-toolkit`'s
    `mountAppShell` (see `TermtasticToolkitBootstrap.kt`). The toolkit
    builds the entire frame — top bar, tab strip, sidebar, layout root,
    pane chrome — inside `#app` (the toolkit bottom bar is disabled via
    `showBottomBar = false`). Everything that used to
    live here (header, tab bar, dividers, sidebar shell) has moved into
    the toolkit; the markup is intentionally near-empty.
-->
<div id="app"></div>
<!--
    The app logo (wordmark + work-state dot), the Claude usage rows, and the
    optional update / news pills are no longer declared here. They are built in
    Kotlin and slotted into the toolkit's left-sidebar header / footer:
      - logo  → TermtasticToolkitBootstrap.buildSidebarLogo()  (AppShellSpec.sidebarHeader)
      - usage + pills → buildSidebarFooter() (AppShellSpec.sidebarFooter)
    See ClaudeUsageBar.kt, AppLogo.kt, UpdateLabel.kt, NewsLabel.kt.
-->
<script type="application/javascript" src="web.js"></script>
</body>
</html>
